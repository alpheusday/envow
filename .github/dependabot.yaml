version: 2
updates:
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "daily"
          time: "00:00"
          timezone: "Etc/UTC"
      cooldown:
          default-days: 1
          include:
              - "*"
      commit-message:
          prefix: "chore"
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "daily"
          time: "00:00"
          timezone: "Etc/UTC"
      cooldown:
          default-days: 1
          include:
              - "*"
      commit-message:
          prefix: "chore"
      ignore:
          # root
          - dependency-name: "typescript"
            versions: ["<7.0.0"]
          # dep
          - dependency-name: "@standard-schema/spec"
          - dependency-name: "ts-vista"
          # peer
          - dependency-name: "arktype"
          - dependency-name: "valibot"
          - dependency-name: "zod"
